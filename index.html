<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hashtag Café — AI Assistant Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0eb;
    --surface: #ffffff;
    --surface2: #f0ebe4;
    --neon: #c084fc;
    --neon-glow: rgba(192, 132, 252, 0.4);
    --neon-dim: rgba(192, 132, 252, 0.15);
    --text: #1a1410;
    --text-muted: #9a9088;
    --accent: #e8d5b7;
    --border: rgba(124, 58, 237, 0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(192,132,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(192,132,252,0.06) 0%, transparent 50%);
  }

  .chat-wrapper {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 0;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chat-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 20px 20px 0 0;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c084fc, #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 20px var(--neon-glow);
    flex-shrink: 0;
  }

  .header-info h2 {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.01em;
  }

  .header-info p {
    font-size: 12px;
    color: var(--neon);
    font-weight: 400;
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    background: #4ade80;
    border-radius: 50%;
    box-shadow: 0 0 6px #4ade80;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .chat-body {
    background: var(--surface);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 20px 18px;
    height: 420px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-body::-webkit-scrollbar { width: 4px; }
  .chat-body::-webkit-scrollbar-track { background: transparent; }
  .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .message {
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: msgIn 0.3s ease both;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-items: flex-end; }
  .message.bot { align-items: flex-start; }

  .bubble {
    max-width: 82%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.55;
    font-weight: 300;
  }

  .message.bot .bubble {
    background: #f3e8ff;
    border: 1px solid rgba(139,92,246,0.2);
    color: var(--text);
    border-radius: 4px 18px 18px 18px;
  }

  .message.user .bubble {
    background: linear-gradient(135deg, #7c3aed, #c084fc);
    color: white;
    border-radius: 18px 18px 4px 18px;
    box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
    font-weight: 400;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 300;
    padding: 0 4px;
  }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 4px;
  }

  .suggestion-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--neon);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    padding: 6px 12px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .suggestion-btn:hover {
    background: var(--neon-dim);
    border-color: var(--neon);
    box-shadow: 0 0 12px var(--neon-glow);
  }

  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 12px 15px;
    background: var(--surface2);
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 4px 18px 18px 18px;
    width: fit-content;
  }

  .typing-dot {
    width: 7px;
    height: 7px;
    background: var(--neon);
    border-radius: 50%;
    animation: typing 1.2s infinite;
    opacity: 0.6;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .chat-footer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 1px solid rgba(255,255,255,0.05);
    border-radius: 0 0 20px 20px;
    padding: 14px 16px;
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #f3e8ff;
    border: 1px solid rgba(139,92,246,0.3);
    border-radius: 100px;
    padding: 8px 8px 8px 18px;
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--border);
    box-shadow: 0 0 0 3px rgba(192,132,252,0.08);
  }

  .input-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 300;
  }

  .input-row input::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #c084fc);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 2px 12px rgba(124,58,237,0.5);
  }

  .send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 20px rgba(124,58,237,0.7); }
  .send-btn:active { transform: scale(0.95); }

  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .powered-by {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 10px;
    letter-spacing: 0.05em;
  }

  .powered-by span { color: var(--neon); opacity: 0.7; }

  .category-bar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .category-bar::-webkit-scrollbar { display: none; }

  .cat-btn {
    background: #f3e8ff;
    border: 1px solid rgba(139,92,246,0.3);
    color: #7c3aed;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 400;
    padding: 7px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }

  .cat-btn:hover, .cat-btn.active {
    background: var(--neon-dim);
    border-color: var(--border);
    color: var(--neon);
    box-shadow: 0 0 10px var(--neon-glow);
  }

  .cat-btn .cat-icon { font-size: 14px; }
</style>
</head>
<body>


<div class="chat-wrapper">
  <div class="chat-header">
    <div class="avatar">
  <svg viewBox="0 0 64 64" width="28" height="28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Cup body -->
    <path d="M12 24h32l-4 20H16L12 24z" fill="white" opacity="0.95"/>
    <!-- Handle -->
    <path d="M44 28h4a6 6 0 0 1 0 12h-4" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Saucer -->
    <ellipse cx="28" cy="46" rx="18" ry="3" fill="white" opacity="0.5"/>
    <!-- Steam lines -->
    <path d="M22 18 Q24 14 22 10" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M28 18 Q30 13 28 8" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M34 18 Q36 14 34 10" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
  </svg>
</div>
    <div class="header-info">
      <h2>Hashtag Café Assistant</h2>
      <p><span class="status-dot"></span> Online  here to help</p>
    </div>
  </div>

  <div class="category-bar">
    <button class="cat-btn" onclick="askCategory('drinks')"><span class="cat-icon"></span> Drinks</button>
    <button class="cat-btn" onclick="askCategory('food')"><span class="cat-icon"></span> Food</button>
    <button class="cat-btn" onclick="askCategory('hours')"><span class="cat-icon"></span> Hours</button>
    <button class="cat-btn" onclick="askCategory('location')"><span class="cat-icon"></span> Location</button>
    <button class="cat-btn" onclick="askCategory('events')"><span class="cat-icon"></span> Events</button>
    <button class="cat-btn" onclick="askCategory('wifi')"><span class="cat-icon"></span> WiFi</button>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="message bot">
      <div class="bubble">Hey! Welcome to <strong>Hashtag Café</strong> 👋 I'm your AI assistant. Ask me anything — hours, menu, parking, events, you name it!</div>
      <span class="msg-time">Just now</span>
    </div>
  </div>

  <div class="chat-footer">
    <div class="input-row">
      <input type="text" id="userInput" placeholder="Ask me anything about the café..." onkeydown="if(event.key==='Enter') sendMessage()" />
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="powered-by">Powered by <span>Claude AI</span> — built for Hashtag Café</div>

<script>
const CAFE_CONTEXT = `You are the AI assistant for Hashtag Café (#Café), a beloved European-style coffee shop in Sarasota, Florida. Be warm, friendly, and a little playful — like a welcoming barista who knows the place inside out.

REAL INFO ABOUT HASHTAG CAFÉ:
- Full name: Hashtag Café (also written #Café)
- Address: 2781 Bee Ridge Rd, Sarasota, FL 34239 (corner of Bee Ridge Rd and S. Tuttle Ave, in a shopping center)
- Phone: (571) 888-4447
- Email: hashtagcafesrq@gmail.com
- Website: hashtagcafesrq.com
- Instagram: @hashtagcafesrq

HOURS:
- MondayFriday: 7:00 AM  5:00 PM
- SaturdaySunday: 8:00 AM  3:00 PM

OWNERS: Family-owned by Bianca, Elias, and their son Mohi Bendraouia. Opened October 30, 2022. Bianca is German, Elias is Moroccan — the café blends European kaffeeklatsch culture with warm Moroccan hospitality.

FOOD & DRINKS:
- European coffee specialties (cappuccinos, lattes, espresso)
- Local tea specialties
- Fresh pastries baked in-house daily
- Food menu including items like margherita pizza
- They also have a food truck menu
- Oat milk available (confirmed by customer reviews  rose latte with oat milk is popular!)
- Almond milk also available

VIBE: Family friendly, casual, relaxed, great place to work (WiFi available), community events like yarn nights, highly rated (4.9 stars across hundreds of reviews)

PARKING: Parking lot available but limited

Keep responses short, friendly, and conversational  1-3 sentences max. Never use bold, bullet points, or any markdown formatting. If asked something you don't know (like specific prices), say "I don't have that detail  check hashtagcafesrq.com or call us at (571) 888-4447!"`;

const conversationHistory = [];
let isTyping = false;

function getTime() {
  return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

function appendMessage(role, text) {
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="bubble">${text}</div><span class="msg-time">${getTime()}</span>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function showTyping() {
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing';
  div.innerHTML = `<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

const categoryQuestions = {
  drinks: "What drinks do you serve?",
  food: "What food do you have on the menu?",
  hours: "What are your opening hours?",
  location: "Where are you located and is there parking?",
  events: "Do you host any events?",
  wifi: "Do you have WiFi?"
};

function askCategory(cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  processMessage(categoryQuestions[cat]);
}

async function sendSuggestion(btn) {
  const text = btn.textContent;
  btn.closest('.suggestions')?.remove();
  await processMessage(text);
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  await processMessage(text);
}

async function processMessage(text) {
  isTyping = true;
  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 
      'Content-Type': 'application/json',
      'x-api-key': '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',
      'anthropic-version': '2023-06-01'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: CAFE_CONTEXT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    let reply = data.content?.[0]?.text || "Sorry, I'm having a little moment  try again!";
    reply = reply.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*(.*?)\*/g, '$1');

    removeTyping();
    conversationHistory.push({ role: 'assistant', content: reply });
    appendMessage('bot', reply);
  } catch (err) {
    removeTyping();
    appendMessage('bot', "Oops, something went wrong on my end! Try again in a sec ");
  }

  isTyping = false;
}
</script>
</body>
</html>
